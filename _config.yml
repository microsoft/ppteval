# Site settings
title: "PPT-Eval"
description: "A Benchmark for Computer-Use Agents on PowerPoint Tasks"
asset_version: "20260629.4"
# For a GitHub Pages project site under https://microsoft.github.io/PPTEval
# baseurl must be the repository name prefixed with a slash. The site.url should be the org/user root only.
# This was previously misconfigured (baseurl empty and url pointing to the project path), causing asset URLs
# like /assets/css/main.css to resolve against https://microsoft.github.io/ instead of https://microsoft.github.io/PPTEval/.
# That resulted in 404s for CSS/JS and the page rendering unstyled.
# GitHub Actions workflow overrides baseurl via --baseurl flag from actions/configure-pages.
# For local development, baseurl "" works fine with `bundle exec jekyll serve`.
baseurl: "" # overridden by CI; set to repo name (e.g. "/PPTEval") if deploying as project site
url: "https://silver-fortnight-3evlg1k.pages.github.io" # your GitHub Pages domain


# Build settings
markdown: kramdown  
highlighter: rouge
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .vscode/
  - .github/
  - README.md
  - _site/ # ensure the generated site is never committed
  - .sass-cache/

# Collections
collections:
  authors:
    output: false

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Site metadata
author: "Microsoft"
email: "contact@ppteval.com"
twitter_username: microsoft
github_username: microsoft

# Navigation
navigation:
  - title: "Home"
    url: "#home"
  - title: "Screenshots"
    url: "#screenshots"
  - title: "Abstract"
    url: "#abstract"
  - title: "Infrastructure"
    url: "#infrastructure"
  - title: "Data Stats"
    url: "#statistics"
  - title: "Leaderboard"
    url: "#leaderboard"
  - title: "Evaluation"
    url: "#evaluation"
  - title: "Citation"
    url: "#bibtex"
  - title: "License"
    url: "#license"

# Social links
social_links:
  paper: "https://openreview.net/pdf?id=GmeK95WQQ4"
  code: "https://github.com/microsoft/PPTEval"
  data: "#"
  documentation: "#"

# Analytics (optional)
google_analytics: ""

# Kramdown settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false
