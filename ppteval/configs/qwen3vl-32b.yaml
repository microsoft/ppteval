# Qwen3-VL 32B Agent Configuration
# Uses litellm with an OpenAI-compatible endpoint

# Model settings
agent_type: "qwen3vl"
# Served name from the self-hosted vLLM /v1/models endpoint. The litellm
# "openai/" prefix routes through the OpenAI-compatible HTTP client; the
# trailing token must match what vLLM advertises.
model_name: "openai/Qwen/Qwen3-VL-32B-Instruct"

# API settings — self-hosted vLLM via devtunnel.
api_key: "${QWEN3VL_32B_API_KEY}"
base_url: "${QWEN3VL_32B_BASE_URL}"

# Model parameters. Keep output capped so prompt tokens + output budget stay
# below the 32k model context window on vLLM, and avoid fully deterministic
# decoding for Qwen3-VL's GUI loop behavior.
temperature: 0.7
top_p: 0.9
# max_tokens is the OUTPUT budget. With a 32k context, 4096 output tokens leaves
# roughly 28k for prompt/images/history.
max_tokens: 4096

# Thinking mode
enable_thinking: false
thinking_budget: 4096

# Display settings
# 1920x1080 to match opencua — PowerPoint Online's slide thumbnails are
# unreadable at 1024x768 (~30px tall), causing the model to loop on the
# same click. Qwen3-VL's smart_resize natively handles up to ~1080p.
display_size:
  width: 1920
  height: 1080

# Agent behavior
history_n: 4
# "relative" matches the legacy officearena default. A smoke test on 3-002 with
# coordinate_type="absolute" showed qwen-32b collapsing from a 16+14 click/type
# alternation to a 30x single-click loop, and qwen-8b clicking further off the
# title text. Qwen3-VL grounds better in the 0..999 grid than in raw pixels.
coordinate_type: "relative"

# Request settings
max_retries: 5
timeout_seconds: 60
