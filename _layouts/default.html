<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body>
  {% unless page.url == '/' %}
    {% include header.html %}
  {% endunless %}

  <main class="page-content{% if page.url == '/' %} no-header{% endif %}" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}
  
  <!-- Prism.js for syntax highlighting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  
  <!-- JavaScript -->
  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.asset_version }}"></script>
  
  <!-- Analytics -->
  {% if site.google_analytics %}
    {% include google-analytics.html %}
  {% endif %}
</body>
</html>
